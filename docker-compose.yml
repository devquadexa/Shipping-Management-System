services:

  # ── SQL Server Express (Free) ──────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cargo_db
    environment:
      SA_PASSWORD: "${DB_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${DB_PASSWORD}\" -No -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"${DB_PASSWORD}\" -Q 'SELECT 1'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ── Node.js Backend API ────────────────────────────────────
  backend:
    build: ./backend-api
    container_name: cargo_backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_SERVER: db
      DB_PORT: 1433
      DB_DATABASE: "${DB_DATABASE}"
      DB_USER: sa
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERTIFICATE: "true"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── React Frontend (Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: "http://${SERVER_IP}:5000/api"
    container_name: cargo_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mssql_data:
