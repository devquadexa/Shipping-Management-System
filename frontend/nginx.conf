server {
    listen 80;
    server_name supershinecargo.cloud www.supershinecargo.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name supershinecargo.cloud www.supershinecargo.cloud;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/supershinecargo.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/supershinecargo.cloud/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # React Router support — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
